name: ci

on:
  pull_request:
  push:
    branches: [main, feat/bootstrap-mvp]

jobs:
  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.11.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test

  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.7.1
      - run: |
          mkdir -p lib
          git clone --depth 1 --branch v5.6.1 https://github.com/OpenZeppelin/openzeppelin-contracts.git lib/openzeppelin-contracts
          git clone --depth 1 --branch v1.7.1 https://github.com/foundry-rs/forge-std.git lib/forge-std
          git clone https://github.com/dapphub/ds-test.git lib/ds-test
          git -C lib/ds-test checkout e282159d5170298eb2455a6c05280ab5a73a4ef0
        working-directory: contracts
      - run: forge test
        working-directory: contracts
