name: ci

on:
  pull_request:
  push:
    branches: [main, feat/bootstrap-mvp]

jobs:
  typescript:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: cripto_tip
          POSTGRES_PASSWORD: cripto_tip_dev
          POSTGRES_DB: cripto_tip
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cripto_tip -d cripto_tip"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.11.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm lint
      - name: Safe pnpm typecheck summary
        run: node scripts/safe-pnpm-typecheck-summary.mjs --output reports/pnpm-typecheck-safe-summary.json
        env:
          CODEX_PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          CODEX_PR_BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
      - name: Safe pnpm test summary
        run: node scripts/safe-pnpm-test-summary.mjs --output reports/pnpm-test-safe-summary.json --typecheck-result success
        env:
          CODEX_PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          CODEX_PR_BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          RUN_LIVE_POSTGRES_TESTS: "true"
          DATABASE_URL: postgresql://cripto_tip:cripto_tip_dev@localhost:5432/cripto_tip
      - run: pnpm evidence:ci
        env:
          CODEX_PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          CODEX_PR_BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
      - name: Write CI safe failure artifact fallback
        if: always()
        run: node scripts/write-ci-safe-failure-artifact.mjs --command-class metadata --phase ci_metadata --check-name typescript --job-name typescript --output reports/ci-safe-failure-artifact.json
        env:
          CODEX_PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          CODEX_PR_BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
      - name: Export required checks safe metadata
        if: always()
        run: |
          if [ -n "${{ github.event.pull_request.number || '' }}" ]; then
            node scripts/export-required-checks-metadata.mjs --pr "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}" --output reports/ci-required-checks-metadata.json
          else
            node scripts/export-required-checks-metadata.mjs --fixture fixtures/ci-safe/mixed-head-checks.json --output reports/ci-required-checks-metadata.json
          fi
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Upload pnpm typecheck safe summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pnpm-typecheck-safe-summary
          path: reports/pnpm-typecheck-safe-summary.json
          if-no-files-found: warn
      - name: Upload pnpm test safe summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pnpm-test-safe-summary
          path: reports/pnpm-test-safe-summary.json
          if-no-files-found: warn
      - name: Upload CI safe failure artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-safe-failure-artifact
          path: reports/ci-safe-failure-artifact.json
          if-no-files-found: warn
      - name: Upload required checks safe metadata
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-required-checks-metadata
          path: reports/ci-required-checks-metadata.json
          if-no-files-found: warn

  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.7.1
      - run: |
          mkdir -p lib
          git clone --depth 1 --branch v5.6.1 https://github.com/OpenZeppelin/openzeppelin-contracts.git lib/openzeppelin-contracts
          git clone --depth 1 --branch v1.7.1 https://github.com/foundry-rs/forge-std.git lib/forge-std
          git clone https://github.com/dapphub/ds-test.git lib/ds-test
          git -C lib/ds-test checkout e282159d5170298eb2455a6c05280ab5a73a4ef0
        working-directory: contracts
      - run: forge test
        working-directory: contracts
