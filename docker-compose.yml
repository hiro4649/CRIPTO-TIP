services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: cripto_tip
      POSTGRES_PASSWORD: cripto_tip_dev
      POSTGRES_DB: cripto_tip
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cripto_tip -d cripto_tip"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - cripto_tip_pg:/var/lib/postgresql/data

volumes:
  cripto_tip_pg:
